<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <title>Tabelas</title>
</head>

<body>
    <h1>Tabelas</h1>
    <p>
        Tabelas são
        <a href="index.html">elementos básicos</a>
        para adicionar dados na sua página. São diferentes das
        <a href="listas.html">listas</a>.
    </p>

    <table>
        <thead>
            <tr>
                <th scope="col">Nome</th>
                <th scope="col">Quantidade</th>
                <th scope="col">Valor</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th scope="row">Sabonete</th>
                <td>4</td>
                <td>6.50</td>
            </tr>
            <tr>
                <th scope="row">Detergente</th>
                <td>1</td>
                <td>3.50</td>
            </tr>
            <tr>
                <th scope="row">Desinfetante</th>
                <td>1</td>
                <td>9.00</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <th>Total</th>
                <td></td>
                <td>19,00</td>
            </tr>
        </tfoot>
    </table>
</body>

<footer>
    <a href="index.html">Voltar para o índice</a>
</footer>

</html>
